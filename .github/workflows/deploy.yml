# =============================================================================
# SkillSwap — Build + optional Render deploy hook (GitHub Actions)
# =============================================================================
# Static site on github.io → use workflow: deploy-github-pages.yml instead.
# =============================================================================
#
# What this workflow does
#   1) Builds the React client (production)
#   2) Verifies server JavaScript (npm run verify)
#   3) Uploads client/build as a workflow artifact (download from the Actions run)
#   4) Optionally triggers a deploy on Render (or any host that gives you a hook URL)
#
# One-link deploy (API + React + Socket.IO same origin)
#   • On Render: Web Service, root = this repo
#   • Build command:  cd client && npm ci && npm run build && cd ../server && npm ci
#   • Start command:  cd server && npm start
#   • Environment:    NODE_ENV=production, SERVE_CLIENT=true, MONGO_URI, JWT_SECRET,
#                     CLIENT_ORIGIN=https://YOUR-SERVICE.onrender.com
#   • Do NOT set REACT_APP_API_URL so the app uses the same origin (see client/src/config.js)
#
# Optional: auto-redeploy after each push to main
#   • In Render: Service → Settings → Build & Deploy → Deploy Hook → create hook
#   • In GitHub: Repo → Settings → Secrets and variables → Actions → New secret
#                 Name:  RENDER_DEPLOY_HOOK
#                 Value: the full hook URL Render shows
#   • Push to main → this workflow runs → curl triggers a fresh deploy on Render
#
# Split deploy (React on Netlify/Vercel, API on Render)
#   • Add secret REACT_APP_API_URL = https://your-api.onrender.com  (no trailing slash)
#   • Build will bake that into the static files.
#
# =============================================================================

name: Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: Build client & verify server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install & build client
        working-directory: client
        run: |
          npm ci
          npm run build
        env:
          CI: true
          # If unset, production bundle uses the browser origin (same-URL deploy).
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

      - name: Install & verify server
        working-directory: server
        run: |
          npm ci
          npm run verify

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillswap-client-build
          path: client/build
          retention-days: 30

  trigger-host-deploy:
    name: Trigger host deploy hook
    needs: build-and-verify
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook (Render / custom)
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "No RENDER_DEPLOY_HOOK secret — skipping remote trigger."
            echo "Add that secret in GitHub → Settings → Secrets → Actions to auto-deploy."
            exit 0
          fi
          echo "Triggering deploy hook…"
          curl -fsS -X POST "$HOOK"
          echo "Deploy hook OK."
