# =============================================================================
# Deploy the React app to GitHub Pages via GitHub Actions
# =============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve API URL or offline demo mode
        id: api
        shell: bash
        env:
          FROM_SECRET: ${{ secrets.REACT_APP_API_URL }}
          FROM_VAR: ${{ vars.REACT_APP_API_URL }}
        run: |
          U="$FROM_SECRET"
          if [ -z "$U" ]; then U="$FROM_VAR"; fi
          if [ -z "$U" ]; then
            echo "demo=true" >> "$GITHUB_OUTPUT"
            echo "url=http://127.0.0.1:0" >> "$GITHUB_OUTPUT"
            echo "::notice::No REACT_APP_API_URL — building OFFLINE DEMO."
          else
            U="${U%/}"
            case "$U" in
              */api) U="${U%/api}" ;;
            esac
            U="${U%/}"
            echo "demo=false" >> "$GITHUB_OUTPUT"
            echo "url=${U}" >> "$GITHUB_OUTPUT"
          fi

      - name: CORS hint
        if: ${{ steps.api.outputs.demo != 'true' }}
        run: |
          echo "Set CLIENT_ORIGIN to:"
          echo "https://${{ github.repository_owner }}.github.io"

      - name: Set PUBLIC_URL
        id: base
        shell: bash
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$NAME" = "$OWNER.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/$NAME/" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install and build client
        working-directory: client
        env:
          CI: true
          PUBLIC_URL: ${{ steps.base.outputs.path }}
          REACT_APP_API_URL: ${{ steps.api.outputs.url }}
          REACT_APP_DEMO_MODE: ${{ steps.api.outputs.demo }}
          REACT_APP_GOOGLE_CLIENT_ID: ${{ vars.REACT_APP_GOOGLE_CLIENT_ID }}
        run: |
          npm ci
          npm run build

      - name: SPA fallback
        run: cp client/build/index.html client/build/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/build

  deploy:
    name: Publish to Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  redeploy-api:
    name: Trigger Render deploy hook (optional)
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "Triggering Render deploy..."
            curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          else
            echo "No deploy hook set, skipping."
          fi
