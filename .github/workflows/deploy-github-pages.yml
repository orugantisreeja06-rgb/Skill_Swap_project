# =============================================================================
# Deploy the React app to GitHub Pages via GitHub Actions (required for class).
# =============================================================================
#
# GitHub Pages = static files only. If REACT_APP_API_URL is not set, the build
# uses offline DEMO mode (data in localStorage — site works without Render).
# For a shared live backend, set Variable or Secret REACT_APP_API_URL and deploy
# the API (render.yaml). See .github/DEPLOY.md
#
# Optional (GitHub → Settings → Secrets and variables → Actions):
#   REACT_APP_API_URL = https://your-api.onrender.com (no trailing slash, no /api)
#
# On Render, set CLIENT_ORIGIN to: https://YOUR_GITHUB_USERNAME.github.io
#
# Optional secret: RENDER_DEPLOY_HOOK_URL — Render deploy hook to refresh API after Pages deploy.
#
# Optional variable: REACT_APP_GOOGLE_CLIENT_ID — Web client ID from Google Cloud Console
# (same value as GOOGLE_CLIENT_ID on Render). Omit to hide Google sign-in on the site.
# =============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve API URL or offline demo mode
        id: api
        shell: bash
        env:
          FROM_SECRET: ${{ secrets.REACT_APP_API_URL }}
          FROM_VAR: ${{ vars.REACT_APP_API_URL }}
        run: |
          U="$FROM_SECRET"
          if [ -z "$U" ]; then U="$FROM_VAR"; fi
          if [ -z "$U" ]; then
            echo "demo=true" >> "$GITHUB_OUTPUT"
            echo "url=http://127.0.0.1:0" >> "$GITHUB_OUTPUT"
            echo "::notice::No REACT_APP_API_URL — building OFFLINE DEMO (localStorage). Set the variable later for a live API."
          else
            U="${U%/}"
            case "$U" in
              */api) U="${U%/api}" ;;
            esac
            U="${U%/}"
            echo "demo=false" >> "$GITHUB_OUTPUT"
            echo "url=${U}" >> "$GITHUB_OUTPUT"
            echo "✓ API origin for this build: ${U}"
          fi

      - name: CORS hint (set this on your API host)
        if: ${{ steps.api.outputs.demo != 'true' }}
        run: |
          echo "On Render → Environment → CLIENT_ORIGIN must be exactly:"
          echo "https://${{ github.repository_owner }}.github.io"

      - name: Set PUBLIC_URL for GitHub Pages
        id: base
        shell: bash
        run: |
          NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$NAME" = "$OWNER.github.io" ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
            echo "Using PUBLIC_URL=/ (user site)"
          else
            echo "path=/$NAME/" >> "$GITHUB_OUTPUT"
            echo "Using PUBLIC_URL=/$NAME/ (project site)"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install and build client
        working-directory: client
        env:
          CI: true
          PUBLIC_URL: ${{ steps.base.outputs.path }}
          REACT_APP_API_URL: ${{ steps.api.outputs.url }}
          REACT_APP_DEMO_MODE: ${{ steps.api.outputs.demo }}
          REACT_APP_GOOGLE_CLIENT_ID: ${{ vars.REACT_APP_GOOGLE_CLIENT_ID }}
        run: |
          npm ci
          npm run build

      - name: SPA fallback (direct URLs like /dashboard)
        run: cp client/build/index.html client/build/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: client/build

  deploy:
    name: Publish to Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  redeploy-api:
    name: Trigger Render deploy hook (optional)
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
    steps:
      - name: POST deploy hook
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
