# Verifies the SkillSwap client build and server JavaScript on every push / PR.
# Deploy is still manual or via your host (Render, Railway, etc.): set env vars there.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  client:
    name: Client build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - name: Production build
        run: npm run build
        env:
          CI: true
          REACT_APP_API_URL: http://127.0.0.1:0
          REACT_APP_DEMO_MODE: "true"

  server:
    name: Server verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run verify
